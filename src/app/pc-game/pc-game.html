<div class="game-list">
  <div
    class="game-card"
    *ngFor="let game of gameList; trackBy: trackByGameId"
    role="listitem"
    [attr.data-testid]="'game-card-' + game.id"
  >
    <div class="card-content">
      <h2>{{ game.title }}</h2>

  


<!-- Video Preview or Player -->
<div class="video-wrapper">
  <div *ngIf="selectedId === game.id; else showThumbnail">
    <youtube-player
      [videoId]="extractYoutubeId(game.url) ?? undefined"
      [height]="315"
      [width]="560"
      [playerVars]="{ autoplay: 1, mute: 1, rel: 0 }"
      [attr.data-testid]="'youtube-player-' + game.id"
    ></youtube-player>
  </div>
  <ng-template #showThumbnail>
    <div class="game-preview" (click)="selectGame(game)">
      <img
        [src]="getThumbnail(game)"
        alt="Preview of {{ game.title }}"
        class="thumbnail"
      />
      <div class="play-button" aria-hidden="true">▶</div>
    </div>
  </ng-template>
</div>

      <!-- Description -->
      <div *ngIf="game.description" class="description">
        <h3>Description:</h3>
        <ul>
          <li *ngFor="let line of getDescriptionLines(game.description)">
            {{ line }}
          </li>
        </ul>
      </div>

      <!-- Download Links -->
      <div *ngIf="game.url1" class="downloads">
        <a
          [href]="transformDropboxUrl(game.url1)"
          target="_blank"
          rel="noopener"
          download
          class="download-link"
          [attr.data-testid]="'dropbox-link-' + game.id"
        >
          📥 Download from Dropbox
        </a>
        <a
          [href]="game.url1"
          target="_blank"
          rel="noopener"
          class="magnet-link"
          [attr.data-testid]="'magnet-link-' + game.id"
        >
          🧲 Open Magnet Link
        </a>
      </div>
    </div>
  </div>
</div>
